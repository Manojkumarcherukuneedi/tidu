name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      # The test suite mocks the LLM and uses an in-memory DB, so CI needs
      # neither an API key nor a running MySQL.
      - name: Run tests
        run: python -m pytest

  frontend-build:
    name: Frontend build (vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # Catches JSX/import/compile errors on every push.
      - name: Build
        working-directory: frontend
        run: npm run build
